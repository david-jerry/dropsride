{% load humanize %}

{% for object in objects %}
{% if forloop.last %}
<div hx-get="{% url 'cities' %}?page={{ page_obj.number|add:1 }}" hx-swap="afterend" hx-trigger="revealed" hx-target="this" class="rounded-xl hover:shadow-xl group duration overflow-hidden shadow-md p-6 bg-black/5">
{% else %}
<div class="rounded-xl hover:shadow-xl group duration overflow-hidden shadow-md p-6 bg-black/5">
{% endif %}
  <h3 class="text-xl md:text-2xl font-bold pb-6">{{object.title|title}}</h3>
  <div class="divide-x-2 bg-black/40 flex items-center space-x-6 text-sm text-white justify-center py-4 border-t-0.5 border-t-gray-300">
    <div class="flex items-center space-x-3">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
        <path fill-rule="evenodd" d="M3 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5H15v-18a.75.75 0 000-1.5H3zM6.75 19.5v-2.25a.75.75 0 01.75-.75h3a.75.75 0 01.75.75v2.25a.75.75 0 01-.75.75h-3a.75.75 0 01-.75-.75zM6 6.75A.75.75 0 016.75 6h.75a.75.75 0 010 1.5h-.75A.75.75 0 016 6.75zM6.75 9a.75.75 0 000 1.5h.75a.75.75 0 000-1.5h-.75zM6 12.75a.75.75 0 01.75-.75h.75a.75.75 0 010 1.5h-.75a.75.75 0 01-.75-.75zM10.5 6a.75.75 0 000 1.5h.75a.75.75 0 000-1.5h-.75zm-.75 3.75A.75.75 0 0110.5 9h.75a.75.75 0 010 1.5h-.75a.75.75 0 01-.75-.75zM10.5 12a.75.75 0 000 1.5h.75a.75.75 0 000-1.5h-.75zM16.5 6.75v15h5.25a.75.75 0 000-1.5H21v-12a.75.75 0 000-1.5h-4.5zm1.5 4.5a.75.75 0 01.75-.75h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75h-.008a.75.75 0 01-.75-.75v-.008zm.75 2.25a.75.75 0 00-.75.75v.008c0 .414.336.75.75.75h.008a.75.75 0 00.75-.75v-.008a.75.75 0 00-.75-.75h-.008zM18 17.25a.75.75 0 01.75-.75h.008a.75.75 0 01.75.75v.008a.75.75 0 01-.75.75h-.008a.75.75 0 01-.75-.75v-.008z" clip-rule="evenodd" />
      </svg>

      <span>
        {{object.head_office }}
      </span>
    </div>
    <div class="flex items-center space-x-3 pl-5">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
        <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
      </svg>
      <span>
        {% if not object.rep %}
        Dropsride
        {% else %}
        {{object.rep|title }}
        {% endif %}
      </span>
    </div>
  </div>
  <div class="flex items-center">
    <a href="tel://{{object.office_phone_1}}" class="w-1/2 py-3 block hover:scale-105 duration-300 bg-black text-white font-medium uppercase text-base text-center">{{object.office_phone_1}}</a>
    <a href="tel://{{object.office_phone_1}}" class="w-1/2 py-3 block hover:scale-105 duration-300 bg-warning text-black font-medium uppercase text-base text-center">{{object.office_phone_1}}</a>
  </div>
</div>
{% endfor %}
